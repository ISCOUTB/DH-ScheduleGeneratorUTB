# Nginx de desarrollo — modo "Nivel 2" (UI con datos reales del backend).
#
# El contenedor `web` deja de compilar Flutter y solo hace de proxy:
#   - /api/  -> backend en Docker (contenedor `api`)
#   - todo lo demás -> dev-server de Flutter que corre en el HOST (puerto 8080)
#
# Así la app y la API quedan en el MISMO origen (http://localhost), evitando
# problemas de CORS, cookies y redirecciones de OAuth.
#
# Se usa junto con docker-compose.frontend-dev.yml. Ver docs/desarrollo-local.md.
server {
    listen 80;
    server_name localhost;

    # Proxy de la API al backend en Docker.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Resto de rutas -> dev-server de Flutter en el host.
    # host.docker.internal apunta al host gracias a extra_hosts (host-gateway).
    location / {
        proxy_pass http://host.docker.internal:8080;
        proxy_set_header Host $host;
        proxy_http_version 1.1;

        # Soporte WebSocket (necesario si en el futuro se usa -d chrome / DWDS).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Sin buffering ni caché para ver los cambios al refrescar.
        proxy_buffering off;
    }
}
